<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maho-Mon Kindle</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
      }
      body {
        font-family: Georgia, serif;
        background-color: #fff;
        color: #000;
        padding: 12px;
        line-height: 1.4;
        font-size: 16px;
        display: flex;
        flex-direction: column;
      }
      #app {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .header {
        text-align: center;
        border-bottom: 2px solid #000;
        padding-bottom: 10px;
        margin-bottom: 12px;
        flex-shrink: 0;
      }
      .title {
        font-size: 30px;
        font-weight: bold;
        color: #000;
      }
      .subtitle {
        font-size: 16px;
        color: #333;
      }
      .main-grid {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr;
        gap: 12px;
      }
      .section {
        border: 2px solid #000;
        border-radius: 2px;
        padding: 12px;
        display: flex;
        flex-direction: column;
      }
      .section-title {
        font-size: 18px;
        font-weight: bold;
        border-bottom: 2px solid #000;
        padding-bottom: 6px;
        margin-bottom: 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .item { display: flex; justify-content: space-between; }
      .label { font-size: 15px; color: #333; }
      .value { font-size: 17px; font-weight: bold; color: #000; }
      .row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-top: 1px solid #ccc;
      }
      .token-box {
        text-align: center;
        padding: 10px;
        margin: 10px 0;
        background-color: #000;
        color: #fff;
        border-radius: 2px;
      }
      .token-value {
        font-size: 36px;
        font-weight: bold;
        color: #fff;
      }
      .token-label {
        font-size: 14px;
        color: #ccc;
      }
      .bar-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
      }
      .bar-label {
        width: 50px;
        font-size: 16px;
        font-weight: bold;
      }
      .bar-bg {
        flex: 1;
        height: 14px;
        background-color: #ddd;
        border: 1px solid #000;
        border-radius: 1px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        background-color: #000;
      }
      .bar-value {
        width: 50px;
        text-align: right;
        font-size: 16px;
        font-weight: bold;
      }
      .footer {
        margin-top: 12px;
        padding: 10px;
        border: 2px solid #000;
        border-radius: 2px;
        display: flex;
        justify-content: space-around;
        font-size: 16px;
        flex-shrink: 0;
      }
      .loading {
        text-align: center;
        font-size: 18px;
        padding: 20px;
        color: #000;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading">Loading...</div>
    </div>

    <script>
      var API_BASE = 'http://' + window.location.hostname + ':3001/api';

      function formatTokens(tokens) {
        if (tokens >= 1000000) return (tokens / 1000000).toFixed(2) + 'M';
        if (tokens >= 1000) return (tokens / 1000).toFixed(1) + 'K';
        return tokens.toString();
      }

      function formatDuration(seconds) {
        var hours = Math.floor(seconds / 3600);
        var minutes = Math.floor((seconds % 3600) / 60);
        var secs = seconds % 60;
        return hours + ':' + String(minutes).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
      }

      function formatCacheTime(seconds) {
        if (seconds <= 0) return 'Exp';
        var minutes = Math.floor(seconds / 60);
        var secs = seconds % 60;
        return minutes > 0 ? minutes + 'm' + secs + 's' : secs + 's';
      }

      function formatSpeed(speedBps) {
        if (speedBps < 1024) return speedBps.toFixed(0) + 'B/s';
        if (speedBps < 1024 * 1024) return (speedBps / 1024).toFixed(1) + 'KB/s';
        return (speedBps / 1024 / 1024).toFixed(1) + 'MB/s';
      }

      function render(data, system) {
        var projectName = data.sessionCwd ? data.sessionCwd.split(/[\\\/]/).pop() : '';

        var html = '<div class="header">' +
          '<span class="title">Maho-Mon</span> ' +
          '<span class="subtitle">Claude Monitor</span>' +
        '</div>';

        html += '<div class="main-grid">';

        // Left Column: Session + System
        html += '<div class="section">' +
          '<div class="section-title">Session</div>' +
          '<div style="margin-bottom:8px"><span class="label">Project: </span><span class="value">' + (projectName || '-') + '</span></div>' +
          '<div class="grid">' +
            '<div class="item"><span class="label">Model</span><span class="value">' + (data.modelName || '-') + '</span></div>' +
            '<div class="item"><span class="label">Branch</span><span class="value">' + (data.gitBranch || '-') + '</span></div>' +
            '<div class="item"><span class="label">Files</span><span class="value">' + data.filesModified + '</span></div>' +
            '<div class="item"><span class="label">Msgs</span><span class="value">' + data.sessionMessages + '</span></div>' +
          '</div>' +
          '<div class="token-box">' +
            '<div class="token-value">' + formatTokens(data.sessionTokens) + '</div>' +
            '<div class="token-label">In: ' + formatTokens(data.sessionInput) + ' Out: ' + formatTokens(data.sessionOutput) + '</div>' +
          '</div>' +
          '<div class="row"><span class="label">Context</span><span class="value">' + data.contextPercent + '%</span></div>' +
          '<div class="row"><span class="label">Cache</span><span class="value">' + (data.cacheRemainingSeconds > 0 ? formatCacheTime(data.cacheRemainingSeconds) : 'Exp') + '</span></div>' +
          '<div class="row"><span class="label">Msgs</span><span class="value">' + data.sessionMessages + '</span></div>' +
          '<div class="row"><span class="label">Time</span><span class="value">' + formatDuration(data.sessionDuration) + '</span></div>' +
        '</div>';

        // Right Column: Total Stats
        html += '<div class="section">' +
          '<div class="section-title">Total</div>' +
          '<div class="token-box">' +
            '<div class="token-value">' + formatTokens(data.totalTokens) + '</div>' +
            '<div class="token-label">Tokens</div>' +
          '</div>' +
          '<div class="grid">' +
            '<div class="item"><span class="label">Input</span><span class="value">' + formatTokens(data.inputTokens) + '</span></div>' +
            '<div class="item"><span class="label">Output</span><span class="value">' + formatTokens(data.outputTokens) + '</span></div>' +
            '<div class="item"><span class="label">Cost</span><span class="value">$' + data.cost.toFixed(2) + '</span></div>' +
            '<div class="item"><span class="label">Sessions</span><span class="value">' + data.totalSessions + '</span></div>' +
          '</div>' +
          '<div class="section-title" style="margin-top:6px">System</div>' +
          '<div class="bar-row">' +
            '<span class="bar-label">CPU</span>' +
            '<div class="bar-bg"><div class="bar-fill" style="width:' + (system ? system.cpu : 0) + '%"></div></div>' +
            '<span class="bar-value">' + Math.round(system ? system.cpu : 0) + '%</span>' +
          '</div>' +
          '<div class="bar-row">' +
            '<span class="bar-label">MEM</span>' +
            '<div class="bar-bg"><div class="bar-fill" style="width:' + (system ? system.memory : 0) + '%"></div></div>' +
            '<span class="bar-value">' + Math.round(system ? system.memory : 0) + '%</span>' +
          '</div>' +
        '</div>';

        html += '</div>';

        // Footer: Network
        html += '<div class="footer">' +
          '<span>↑ ' + formatSpeed(system ? system.networkUp : 0) + '</span>' +
          '<span>↓ ' + formatSpeed(system ? system.networkDown : 0) + '</span>' +
        '</div>';

        document.getElementById('app').innerHTML = html;
      }

      function fetchData() {
        var xhr1 = new XMLHttpRequest();
        var xhr2 = new XMLHttpRequest();
        var usageData = null;
        var systemData = null;

        xhr1.open('GET', API_BASE + '/usage', true);
        xhr1.onload = function() {
          if (xhr1.status === 200) {
            usageData = JSON.parse(xhr1.responseText);
            if (systemData) render(usageData, systemData);
          }
        };
        xhr1.send();

        xhr2.open('GET', API_BASE + '/system', true);
        xhr2.onload = function() {
          if (xhr2.status === 200) {
            systemData = JSON.parse(xhr2.responseText);
            if (usageData) render(usageData, systemData);
          }
        };
        xhr2.send();
      }

      fetchData();
      setInterval(fetchData, 5000);
    </script>
  </body>
</html>
